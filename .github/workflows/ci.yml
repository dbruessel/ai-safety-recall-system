name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (Python / pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/ -v

  frontend:
    name: Frontend (Next.js / ESLint + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-recall-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ai-recall-frontend
        run: npm ci

      - name: Lint
        working-directory: ai-recall-frontend
        run: npm run lint

      - name: Build
        working-directory: ai-recall-frontend
        run: npm run build
